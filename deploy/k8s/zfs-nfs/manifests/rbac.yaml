apiVersion: v1
kind: ServiceAccount
metadata:
  name: branchdb-operator
  namespace: branchdb-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: branchdb-operator
rules:
  # DatabaseBranch CRD
  - apiGroups: ["branchdb.io"]
    resources: ["databasebranches"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["branchdb.io"]
    resources: ["databasebranches/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["branchdb.io"]
    resources: ["databasebranches/finalizers"]
    verbs: ["update"]
  # PersistentVolume / PersistentVolumeClaim
  - apiGroups: [""]
    resources: ["persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod / Service (for per-branch MySQL)
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # ConfigMap (quota / config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Secrets (license key, MySQL passwords)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: branchdb-operator
subjects:
  - kind: ServiceAccount
    name: branchdb-operator
    namespace: branchdb-system
roleRef:
  kind: ClusterRole
  name: branchdb-operator
  apiGroup: rbac.authorization.k8s.io
