apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databasebranches.branchdb.io
spec:
  group: branchdb.io
  names:
    kind: DatabaseBranch
    listKind: DatabaseBranchList
    plural: databasebranches
    singular: databasebranch
    shortNames:
      - dbb
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Port
          type: integer
          jsonPath: .status.port
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["snapshotName"]
              properties:
                snapshotName:
                  type: string
                  description: "Source ZFS snapshot name (e.g. auto-20240101)"
                ttlHours:
                  type: integer
                  minimum: 1
                  maximum: 720
                  default: 24
                  description: "Branch lifetime in hours; 0 = no expiry"
                mysqlVersion:
                  type: string
                  default: "8.0"
                  description: "MySQL image tag"
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "256Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Provisioning", "Running", "Terminating", "Failed"]
                port:
                  type: integer
                podName:
                  type: string
                pvcName:
                  type: string
                pvName:
                  type: string
                clonePath:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: ["type", "status"]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
