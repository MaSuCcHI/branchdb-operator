{{- if .Values.installCRDs }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  name: databasebranches.branchdb.io
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
spec:
  group: branchdb.io
  names:
    kind: DatabaseBranch
    listKind: DatabaseBranchList
    plural: databasebranches
    singular: databasebranch
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.externalPort
      name: ExternalPort
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DatabaseBranch は BranchDB が管理するデータベースブランチを表す。
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents.
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseBranchSpec は DatabaseBranch の望ましい状態を定義する。
            properties:
              databaseType:
                description: "DatabaseType は起動するデータベースの種類。対応値: mysql（デフォルト）, postgres, redis"
                type: string
                default: mysql
              databaseVersion:
                description: DatabaseVersion はコンテナイメージのタグを上書きする。省略時は Operator のデフォルトを使用する。
                type: string
              snapshotRef:
                description: SnapshotRef はブランチの元となるスナップショット名を指定する。
                type: string
              ttlHours:
                description: TTLHours はブランチの有効期間（時間）を指定する。0 は無期限を意味する。
                type: integer
            required:
            - snapshotRef
            type: object
          status:
            description: DatabaseBranchStatus は DatabaseBranch の観測された状態を定義する。
            properties:
              clusterHost:
                type: string
              clusterPort:
                type: integer
              credentialSecret:
                description: CredentialSecret はブランチ固有のパスワードを保存する K8s Secret 名（ZFSDB_BRANCH_AUTH=generated
                  のときのみ設定）。
                type: string
              expiresAt:
                format: date-time
                type: string
              externalHost:
                type: string
              externalPort:
                type: integer
              message:
                type: string
              phase:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
