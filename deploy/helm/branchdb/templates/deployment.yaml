apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "branchdb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "branchdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "branchdb.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "branchdb.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.ports.metrics }}
            - --health-probe-bind-address=:{{ .Values.ports.health }}
            - --leader-elect={{ .Values.leaderElection.enabled }}
          env:
            - name: ZFSDB_EXTERNAL_HOST
              value: {{ .Values.externalHost | quote }}
            - name: ZFSDB_NAMESPACE
              value: {{ include "branchdb.branchNamespace" . | quote }}
            - name: ZFSDB_MYSQL_IMAGE
              value: {{ .Values.mysqlImage | quote }}
            - name: ZFSAGENT_URL
              value: {{ .Values.zfsAgent.url | quote }}
            {{- if or .Values.zfsAgent.token .Values.zfsAgent.existingSecret }}
            - name: ZFSAGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "branchdb.secretName" . }}
                  key: zfsagent-token
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            - name: health
              containerPort: {{ .Values.ports.health }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
