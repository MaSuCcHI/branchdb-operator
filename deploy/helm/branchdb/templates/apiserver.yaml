{{- if .Values.apiServer.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "branchdb.apiServer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "branchdb.apiServer.fullname" . }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
rules:
  # REST ハンドラの CR CRUD と watch ループの list/watch
  - apiGroups: ["branchdb.io"]
    resources: ["databasebranches"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "branchdb.apiServer.fullname" . }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "branchdb.apiServer.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "branchdb.apiServer.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "branchdb.apiServer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiServer.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "branchdb.apiServer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "branchdb.apiServer.selectorLabels" . | nindent 8 }}
      {{- with .Values.apiServer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "branchdb.apiServer.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.apiServer.image.repository }}:{{ .Values.apiServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.apiServer.image.pullPolicy }}
          env:
            - name: ZFSDB_LISTEN_ADDR
              value: ":{{ .Values.apiServer.listenPort }}"
            - name: ZFSDB_EXTERNAL_HOST
              value: {{ .Values.externalHost | quote }}
            - name: ZFSDB_NAMESPACE
              value: {{ include "branchdb.branchNamespace" . | quote }}
            - name: ZFSDB_ZFSAGENT_URL
              value: {{ .Values.zfsAgent.url | quote }}
            {{- if or .Values.zfsAgent.token .Values.zfsAgent.existingSecret }}
            - name: ZFSDB_ZFSAGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "branchdb.secretName" . }}
                  key: zfsagent-token
            {{- end }}
          ports:
            - name: rest
              containerPort: {{ .Values.apiServer.listenPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: rest
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
      {{- with .Values.apiServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.apiServer.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "branchdb.apiServer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "branchdb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.apiServer.service.type }}
  selector:
    {{- include "branchdb.apiServer.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest
      port: {{ .Values.apiServer.listenPort }}
      targetPort: rest
      {{- if and (eq .Values.apiServer.service.type "NodePort") .Values.apiServer.service.nodePort }}
      nodePort: {{ .Values.apiServer.service.nodePort }}
      {{- end }}
{{- end }}
{{- end }}
