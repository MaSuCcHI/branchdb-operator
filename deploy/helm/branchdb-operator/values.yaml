# BranchDB Operator Helm values

replicaCount: 1

image:
  repository: ghcr.io/branchdb/branchdb-operator
  # 省略時は Chart.appVersion を使用
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ── BranchDB 設定 ─────────────────────────────────────────────────────────────

# 外部クライアントが branch MySQL に接続するためのホスト名 (NodePort の外部 IP / DNS)。
externalHost: ""

# branch MySQL の Pod/PVC/Service を作成する namespace。
# 空の場合は Release の namespace を使用する。
branchNamespace: ""

# branch MySQL に使用するコンテナイメージ。
mysqlImage: "mysql:8.0"

# ── ZFS Agent 接続 ────────────────────────────────────────────────────────────
# operator は ZFS のクローン/スナップショット操作を ZFS Agent (HTTP) に委譲する。
zfsAgent:
  # ZFS Agent のベース URL (必須)。例: http://zfs-agent.zfs.svc.cluster.local:9090
  url: ""
  # Bearer トークン。existingSecret 未指定時にこの値で Secret を作成する。
  token: ""
  # 既存 Secret からトークンを参照する場合に指定 (key は zfsagent-token)。
  existingSecret: ""

# ── リーダー選出 ──────────────────────────────────────────────────────────────
leaderElection:
  enabled: true

# ── サービスアカウント / RBAC ─────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # ClusterRole / ClusterRoleBinding を作成する。
  create: true

# ── メトリクス / ヘルスポート ─────────────────────────────────────────────────
ports:
  metrics: 8080
  health: 8081

# metrics 用 Service を作成する。
service:
  enabled: true
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# 追加の環境変数 (name/value)。
extraEnv: []

# ── REST API サーバー ──────────────────────────────────────────────────────────
# 有効化すると zfs-db を k8s モード (ZFSDB_BACKEND=k8s) で動かす。
#  - REST API (POST/GET/DELETE /branches) で DatabaseBranch CR を作成/削除
#  - branch MySQL への外部接続は K8s NodePort Service 経由（TCP プロキシ不要）
# 外部クライアントから branch MySQL に接続させたい場合に使う。
apiServer:
  enabled: false
  image:
    repository: ghcr.io/branchdb/branchdb
    # 省略時は Chart.appVersion を使用
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  # REST API のリッスンポート
  listenPort: 8080
  # REST API 用 Service (ClusterIP)。
  service:
    enabled: true
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
