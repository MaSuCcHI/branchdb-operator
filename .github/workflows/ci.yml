name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: test
        run: go test ./internal/... ./cmd/... -count=1 -race -coverprofile=coverage.out
        env:
          CGO_ENABLED: 1

      - name: coverage-check
        # Baseline: current coverage is ~69.6%. Threshold set to 65% to catch regressions.
        # Target per CLAUDE.md is 95% — raise this threshold as coverage improves.
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 65) { print "Coverage " t "% is below 65% threshold"; exit 1 } }'

      - name: build
        run: go build ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: audit
        run: npm audit --audit-level=high

      - run: npm run build
