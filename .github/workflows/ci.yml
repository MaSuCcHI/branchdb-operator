name: CI

on:
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: test
        run: go test ./internal/... ./cmd/... -count=1 -race

      - name: build
        run: go build ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build
