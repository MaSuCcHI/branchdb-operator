name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-push:
    name: Build and push (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: operator
            image: ghcr.io/masucchi/branchdb-operator
            dockerfile: Dockerfile.operator
          - name: branchdb
            image: ghcr.io/masucchi/branchdb
            dockerfile: Dockerfile.branchdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  publish-chart:
    name: Publish Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/branchdb \
            --version "${VERSION}" \
            --app-version "${VERSION}"
          helm push "branchdb-${VERSION}.tgz" oci://ghcr.io/masucchi/charts

      - name: Push Artifact Hub repository metadata
        run: |
          oras push ghcr.io/masucchi/charts/branchdb:artifacthub.io \
            deploy/helm/branchdb/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.tag }}
          generate_release_notes: true
          make_latest: true
